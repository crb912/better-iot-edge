# docker-compose.yml
# 本地开发用：启动 EdgeX 核心服务 + Edge Gateway
# 使用方法：
#   docker-compose up -d
#   查看日志：docker-compose logs -f edge-gateway

version: "3.8"

networks:
  edgex-network:
    driver: bridge

volumes:
  redis-data:
  consul-data:

services:

  # ── 基础设施 ──────────────────────────────────────────────────────────────

  consul:
    image: consul:1.16
    ports:
      - "8500:8500"
    networks:
      - edgex-network
    volumes:
      - consul-data:/consul/data
    command: >
      agent -server -bootstrap -ui
      -client=0.0.0.0
      -bind=0.0.0.0

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - edgex-network
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1

  # ── EdgeX 核心服务 ────────────────────────────────────────────────────────

  core-metadata:
    image: edgexfoundry/core-metadata:3.1.0
    ports:
      - "59881:59881"
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: "core-metadata"
      REGISTRY_HOST: "consul"
      DATABASE_HOST: "redis"
    depends_on:
      - consul
      - redis

  core-data:
    image: edgexfoundry/core-data:3.1.0
    ports:
      - "59880:59880"
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: "core-data"
      REGISTRY_HOST: "consul"
      DATABASE_HOST: "redis"
      MESSAGEQUEUE_HOST: "redis"
    depends_on:
      - core-metadata

  core-command:
    image: edgexfoundry/core-command:3.1.0
    ports:
      - "59882:59882"
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: "core-command"
      REGISTRY_HOST: "consul"
      DATABASE_HOST: "redis"
    depends_on:
      - core-metadata

  # ── Edge Gateway 设备服务 ─────────────────────────────────────────────────

  edge-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: edge-gateway:latest
    ports:
      - "59999:59999"
    networks:
      - edgex-network
    environment:
      EDGEX_SECURITY_SECRET_STORE: "false"
      SERVICE_HOST: "edge-gateway"
      # 覆盖 configuration.yaml 中的服务地址（容器内用 service name 通信）
      CLIENTS_CORE_METADATA_HOST: "core-metadata"
      CLIENTS_CORE_DATA_HOST: "core-data"
      CLIENTS_CORE_COMMAND_HOST: "core-command"
      REGISTRY_HOST: "consul"
      MESSAGEQUEUE_HOST: "redis"
    depends_on:
      - core-metadata
      - core-data
      - core-command
    # 开发阶段挂载本地 res/ 目录，方便热更新配置和 Profile
    volumes:
      - ./res:/res:ro
    restart: on-failure

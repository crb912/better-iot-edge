# res/configuration.yaml
# Edge Gateway 服务主配置文件
# 格式遵循 EdgeX device-sdk-go v3 约定

Writable:
  LogLevel: "INFO"          # TRACE / DEBUG / INFO / WARN / ERROR
  # 非安全模式下的凭据存储（生产环境应使用 SecretStore + Vault）
  InsecureSecrets:
    DB:
      path: "redisdb"
      Secrets:
        username: ""
        password: ""

Service:
  Host: "localhost"
  Port: 59999              # Edge Gateway REST API 监听端口
  StartupMsg: "Edge Gateway started"
  MaxResultCount: 1024
  MaxRequestSize: 0
  RequestTimeout: "30s"
  HealthCheckInterval: "10s"

Registry:
  Host: "localhost"
  Port: 8500
  Type: "consul"

# EdgeX 核心服务地址（与 docker-compose 网络名称保持一致）
Clients:
  core-data:
    Protocol: "http"
    Host: "localhost"
    Port: 59880
  core-metadata:
    Protocol: "http"
    Host: "localhost"
    Port: 59881
  core-command:
    Protocol: "http"
    Host: "localhost"
    Port: 59882

# MessageBus：Device Service 将采集到的 Event 发布到此总线
# core-data 和 app-service 均订阅此总线
MessageQueue:
  Protocol: "redis"
  Host: "localhost"
  Port: 6379
  Type: "redis"
  AuthMode: "usernamepassword"
  SecretName: "redisdb"
  PublishTopicPrefix: "edgex/events/device"  # 完整 topic: {prefix}/{profile}/{device}
  Optional:
    ClientId: "edge-gateway"
    Qos: "0"
    KeepAlive: "10"
    Retained: "false"
    AutoReconnect: "true"
    ConnectTimeout: "5"

Device:
  DataTransform: true          # 对数值型读数应用 profile 中的变换规则
  MaxCmdOps: 128               # 单个命令最多包含的 deviceResource 数量
  MaxCmdResultLen: 256         # 命令结果 JSON 最大长度
  ProfilesDir: "./res/profiles"   # Device Profile YAML 目录
  DevicesDir: "./res/devices"     # 静态设备列表目录
  UpdateLastConnected: true    # 每次成功通信后更新设备的 LastConnected 时间戳
  UseMessageBus: true          # true=发布到 MessageBus；false=POST 到 core-data REST
  Discovery:
    Enabled: false             # 本网关使用静态预置，不需要自动发现
    Interval: "0"

# ---------- 协议驱动私有配置 ----------
# 通过 sdk.DriverConfigs() 读取，key=string, value=string
[Driver]
  # HTTP Driver
  HttpTimeout  = "5s"    # 单次 HTTP 请求超时（Go duration 格式）
  HttpRetries  = "2"     # 失败后重试次数

  # Modbus Driver（全局默认，可被 device protocols 覆盖）
  ModbusTimeout = "3s"   # Modbus TCP 连接超时（预留，当前在代码中以常量定义）

# res/profiles/humidity.yaml
# 湿度传感器设备档案（Device Profile）
# 对应物理设备：提供 HTTP REST API 的湿度传感器
# SDK 启动时自动将此文件上报到 EdgeX core-metadata

name: "humidity-sensor"
manufacturer: "Generic"
model: "HttpHumidity-v1"
labels:
  - "humidity"
  - "http"
  - "iot"
description: "HTTP REST humidity sensor profile"

# ---------- 设备资源 ----------
deviceResources:
  - name: "humidity"
    isHidden: false
    description: "当前相对湿度（%RH）"
    attributes:
      httpMethod:  "GET"
      httpPath:    "/api/humidity"
      # jsonPath 使用点路径从响应 JSON 中提取数值
      # 示例响应：{"data": {"humidity": 65.3, "unit": "%RH"}}
      jsonPath:    "data.humidity"
      scale:       "1.0"
    properties:
      valueType:   "Float64"
      readWrite:   "R"
      units:       "%RH"
      minimum:     "0"
      maximum:     "100"

  - name: "temperature"
    isHidden: false
    description: "传感器内置温度补偿值（摄氏度）"
    attributes:
      httpMethod:  "GET"
      httpPath:    "/api/temperature"
      jsonPath:    "data.temperature"
      scale:       "1.0"
    properties:
      valueType:   "Float64"
      readWrite:   "R"
      units:       "Celsius"

  - name: "humiditySetpoint"
    isHidden: false
    description: "湿度告警上限设定值（可写）"
    attributes:
      httpMethod:  "POST"
      httpPath:    "/api/setpoint/humidity"
      jsonPath:    ""
      scale:       "1.0"
    properties:
      valueType:   "Float64"
      readWrite:   "W"
      units:       "%RH"
      minimum:     "0"
      maximum:     "100"

# ---------- 设备命令 ----------
deviceCommands:
  - name: "readHumidity"
    readWrite: "R"
    isHidden: false
    resourceOperations:
      - { deviceResource: "humidity" }

  - name: "readAll"
    readWrite: "R"
    isHidden: false
    resourceOperations:
      - { deviceResource: "humidity" }
      - { deviceResource: "temperature" }

  - name: "setHumidityAlarm"
    readWrite: "W"
    isHidden: false
    resourceOperations:
      - { deviceResource: "humiditySetpoint" }

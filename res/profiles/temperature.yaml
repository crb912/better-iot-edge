# res/profiles/temperature.yaml
# 温度传感器设备档案（Device Profile）
# 对应物理设备：Modbus RTU/TCP 温度传感器
# SDK 启动时自动将此文件上报到 EdgeX core-metadata

name: "temperature-sensor"
manufacturer: "Generic"
model: "ModbusTemp-v1"
labels:
  - "temperature"
  - "modbus"
  - "iot"
description: "Modbus TCP/RTU temperature sensor profile"

# ---------- 设备资源 ----------
# 每个 deviceResource 对应一个 Modbus 寄存器（或寄存器组）
deviceResources:
  - name: "temperature"
    isHidden: false
    description: "当前环境温度（摄氏度）"
    attributes:
      modbusFunction:  "holding"   # holding / input
      modbusAddress:   "0"         # 寄存器偏移地址（0 对应 Holding Register 40001）
      modbusDataType:  "float32"   # float32 / int16 / uint16 / int32 / uint32
      scale:           "1.0"       # 数值缩放：实际值 = 寄存器值 × scale
    properties:
      valueType:   "Float64"
      readWrite:   "R"             # R=只读, W=只写, RW=读写
      units:       "Celsius"
      minimum:     "-40"
      maximum:     "125"

  - name: "temperatureRaw"
    isHidden: true
    description: "原始 int16 温度值（×10 = 实际温度）"
    attributes:
      modbusFunction:  "holding"
      modbusAddress:   "2"
      modbusDataType:  "int16"
      scale:           "0.1"       # 寄存器值 × 0.1 = 摄氏度
    properties:
      valueType:   "Float64"
      readWrite:   "R"
      units:       "Celsius"

  - name: "highTemperatureAlarm"
    isHidden: false
    description: "高温报警阈值（可写）"
    attributes:
      modbusFunction:  "holding"
      modbusAddress:   "10"
      modbusDataType:  "float32"
      scale:           "1.0"
    properties:
      valueType:   "Float64"
      readWrite:   "RW"
      units:       "Celsius"
      minimum:     "0"
      maximum:     "125"

# ---------- 设备命令 ----------
# 将一组 deviceResource 聚合为一个对外命令
deviceCommands:
  - name: "readTemperature"
    readWrite: "R"
    isHidden: false
    resourceOperations:
      - { deviceResource: "temperature" }

  - name: "alarm"
    readWrite: "RW"
    isHidden: false
    resourceOperations:
      - { deviceResource: "highTemperatureAlarm" }
